<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Cientifica Web</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="calculator" aria-label="Calculadora cientifica web">
      <div class="display" aria-live="polite">
        <p class="operation" id="operation">0</p>
        <p class="result" id="result">0</p>
      </div>

      <div class="keys">
        <button class="key key-mode" id="angleMode" type="button" data-action="toggle-angle">DEG</button>
        <button class="key key-function" type="button" data-value="sin(">sin</button>
        <button class="key key-function" type="button" data-value="cos(">cos</button>
        <button class="key key-function" type="button" data-value="tan(">tan</button>
        <button class="key key-function" type="button" data-value="log(">log</button>

        <button class="key key-function" type="button" data-value="ln(">ln</button>
        <button class="key key-function" type="button" data-value="sqrt(">sqrt</button>
        <button class="key key-function" type="button" data-value="^">x^y</button>
        <button class="key key-function" type="button" data-value="!">x!</button>
        <button class="key key-function" type="button" data-value="pi">pi</button>

        <button class="key key-action" type="button" data-action="clear">C</button>
        <button class="key key-action" type="button" data-action="delete">DEL</button>
        <button class="key key-operator" type="button" data-value="(">(</button>
        <button class="key key-operator" type="button" data-value=")">)</button>
        <button class="key key-operator" type="button" data-value="/">/</button>

        <button class="key" type="button" data-value="7">7</button>
        <button class="key" type="button" data-value="8">8</button>
        <button class="key" type="button" data-value="9">9</button>
        <button class="key key-operator" type="button" data-value="%">%</button>
        <button class="key key-operator" type="button" data-value="*">x</button>

        <button class="key" type="button" data-value="4">4</button>
        <button class="key" type="button" data-value="5">5</button>
        <button class="key" type="button" data-value="6">6</button>
        <button class="key key-operator" type="button" data-value=".">.</button>
        <button class="key key-operator" type="button" data-value="-">-</button>

        <button class="key" type="button" data-value="1">1</button>
        <button class="key" type="button" data-value="2">2</button>
        <button class="key" type="button" data-value="3">3</button>
        <button class="key key-equals" type="button" data-action="calculate">=</button>
        <button class="key key-operator" type="button" data-value="+">+</button>

        <button class="key key-wide" type="button" data-value="0">0</button>
        <button class="key key-function" type="button" data-value="e">e</button>
        <button class="key key-operator" type="button" data-value=",">,</button>
        <button class="key key-action" type="button" data-action="toggle-sign">+/-</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
